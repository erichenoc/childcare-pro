<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Components - Basic Usage</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {}
      }
    }
  </script>
  <style>
    /* Button base styles */
    .btn {
      @apply inline-flex items-center justify-center px-4 py-2 rounded-md font-medium text-sm transition-all duration-200;
      @apply focus:outline-none focus:ring-2 focus:ring-offset-2;
    }

    /* Button variants */
    .btn-primary {
      @apply bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500;
    }

    .btn-secondary {
      @apply bg-gray-600 text-white hover:bg-gray-700 focus:ring-gray-500;
    }

    .btn-success {
      @apply bg-green-600 text-white hover:bg-green-700 focus:ring-green-500;
    }

    .btn-danger {
      @apply bg-red-600 text-white hover:bg-red-700 focus:ring-red-500;
    }

    .btn-warning {
      @apply bg-yellow-500 text-gray-900 hover:bg-yellow-600 focus:ring-yellow-500;
    }

    .btn-ghost {
      @apply bg-transparent text-gray-700 hover:bg-gray-100 focus:ring-gray-500;
    }

    .btn-outline {
      @apply border-2 border-gray-300 text-gray-700 hover:bg-gray-50 focus:ring-gray-500;
    }

    .btn-link {
      @apply text-blue-600 underline hover:text-blue-800 focus:ring-blue-500 p-0;
    }

    /* Button sizes */
    .btn-xs { @apply text-xs px-2.5 py-1.5; }
    .btn-sm { @apply text-sm px-3 py-1.5; }
    .btn-md { @apply text-sm px-4 py-2; }
    .btn-lg { @apply text-base px-6 py-3; }
    .btn-xl { @apply text-lg px-8 py-4; }

    /* Button states */
    .btn:disabled {
      @apply opacity-50 cursor-not-allowed;
    }

    /* Loading spinner */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-spinner {
      @apply inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full;
      animation: spin 0.6s linear infinite;
    }

    .btn-loading {
      @apply cursor-wait;
    }

    /* Dark mode */
    .dark .btn-ghost {
      @apply text-gray-300 hover:bg-gray-800;
    }

    .dark .btn-outline {
      @apply border-gray-600 text-gray-300 hover:bg-gray-800;
    }
  </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900">
  <div class="min-h-full p-8">
    <div class="max-w-7xl mx-auto space-y-8">
      <!-- Header -->
      <div class="text-center">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">
          Button Components - Basic Usage
        </h1>
        <p class="mt-2 text-gray-600 dark:text-gray-400">
          Comprehensive button system for Tailwind CSS
        </p>
        <button onclick="toggleDarkMode()" class="mt-4 btn btn-outline btn-sm">
          Toggle Dark Mode
        </button>
      </div>

      <!-- Button Variants -->
      <section class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">Button Variants</h2>
        <div class="flex flex-wrap gap-3">
          <button class="btn btn-primary">Primary</button>
          <button class="btn btn-secondary">Secondary</button>
          <button class="btn btn-success">Success</button>
          <button class="btn btn-danger">Danger</button>
          <button class="btn btn-warning">Warning</button>
          <button class="btn btn-ghost">Ghost</button>
          <button class="btn btn-outline">Outline</button>
          <button class="btn btn-link">Link</button>
        </div>
      </section>

      <!-- Button Sizes -->
      <section class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">Button Sizes</h2>
        <div class="flex flex-wrap items-center gap-3">
          <button class="btn btn-primary btn-xs">Extra Small</button>
          <button class="btn btn-primary btn-sm">Small</button>
          <button class="btn btn-primary btn-md">Medium</button>
          <button class="btn btn-primary btn-lg">Large</button>
          <button class="btn btn-primary btn-xl">Extra Large</button>
        </div>
      </section>

      <!-- Button States -->
      <section class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">Button States</h2>
        <div class="flex flex-wrap gap-3">
          <button class="btn btn-primary">Normal</button>
          <button class="btn btn-primary hover:bg-blue-800">Hover</button>
          <button class="btn btn-primary" disabled>Disabled</button>
          <button class="btn btn-primary btn-loading">
            <span class="btn-spinner mr-2"></span>
            Loading
          </button>
        </div>
      </section>

      <!-- Button with Icons -->
      <section class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">Buttons with Icons</h2>
        <div class="flex flex-wrap gap-3">
          <!-- Icon left -->
          <button class="btn btn-primary">
            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Add Item
          </button>

          <!-- Icon right -->
          <button class="btn btn-secondary">
            Download
            <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10"></path>
            </svg>
          </button>

          <!-- Icon only -->
          <button class="btn btn-success p-2" aria-label="Save">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
          </button>
        </div>
      </section>

      <!-- Button Groups -->
      <section class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">Button Groups</h2>

        <!-- Horizontal group -->
        <div class="mb-4">
          <h3 class="text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">Horizontal Group</h3>
          <div class="inline-flex shadow-sm" role="group">
            <button class="btn btn-outline rounded-r-none border-r-0">Left</button>
            <button class="btn btn-outline rounded-none border-r-0">Center</button>
            <button class="btn btn-outline rounded-l-none">Right</button>
          </div>
        </div>

        <!-- Vertical group -->
        <div>
          <h3 class="text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">Vertical Group</h3>
          <div class="inline-flex flex-col shadow-sm" role="group">
            <button class="btn btn-outline rounded-b-none border-b-0">Top</button>
            <button class="btn btn-outline rounded-none border-b-0">Middle</button>
            <button class="btn btn-outline rounded-t-none">Bottom</button>
          </div>
        </div>
      </section>

      <!-- Interactive Demo -->
      <section class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">Interactive Demo</h2>
        <div class="space-y-4">
          <div class="flex gap-3">
            <button onclick="showAlert('Primary clicked!')" class="btn btn-primary">
              Click Me
            </button>
            <button onclick="simulateLoading(this)" class="btn btn-success">
              Simulate Loading
            </button>
            <button onclick="toggleDisabled()" id="toggleBtn" class="btn btn-warning">
              Toggle Disabled
            </button>
          </div>
          <button id="disableTarget" class="btn btn-danger">
            Target Button
          </button>
        </div>
      </section>
    </div>
  </div>

  <script>
    // Dark mode toggle
    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
    }

    // Show alert
    function showAlert(message) {
      alert(message);
    }

    // Simulate loading
    function simulateLoading(button) {
      const originalContent = button.innerHTML;
      button.classList.add('btn-loading');
      button.disabled = true;
      button.innerHTML = '<span class="btn-spinner mr-2"></span> Loading...';

      setTimeout(() => {
        button.classList.remove('btn-loading');
        button.disabled = false;
        button.innerHTML = originalContent;
      }, 2000);
    }

    // Toggle disabled
    function toggleDisabled() {
      const target = document.getElementById('disableTarget');
      target.disabled = !target.disabled;
    }
  </script>
</body>
</html>
